name: Update Bitcoin Terminal Price

on:
  schedule:
    - cron: '5 0 * * *'  # Daily after Midnight UTC
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch terminal price data from BGeometrics
        env:
          BGEOMETRICS_TOKEN: ${{ secrets.BGEOMETRICS_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          from urllib.request import Request, urlopen
          from urllib.parse import urlencode

          FETCH_TERMINAL = False
          FETCH_TRANSFER = True

          TOKEN = os.environ.get('BGEOMETRICS_TOKEN', '')

          def fetch_all(endpoint):
              base = 'https://api.bitcoin-data.com/v1/' + endpoint
              all_records = []
              page = 1
              size = 5000
              while True:
                  url = base + '?' + urlencode({'page': page, 'size': size})
                  req = Request(url)
                  if TOKEN:
                      req.add_header('Authorization', 'Bearer ' + TOKEN)
                  with urlopen(req, timeout=30) as resp:
                      data = json.loads(resp.read().decode())
                  if not data:
                      break
                  all_records.extend(data)
                  print(f'{endpoint} page {page}: {len(data)} records')
                  if len(data) < size:
                      break
                  page += 1
              return all_records

          # Load existing file so skipped endpoints keep their stored values
          try:
              with open('terminal-price.json') as f:
                  existing = {r['d']: r for r in json.load(f)}
          except Exception:
              existing = {}

          terminal_data = fetch_all('terminal-price') if FETCH_TERMINAL else []
          transfer_data = fetch_all('transfer-price') if FETCH_TRANSFER else []

          terminal_map = {r['d']: r for r in terminal_data}
          transfer_map = {r['d']: r['transferPrice'] for r in transfer_data}

          all_dates = set(existing) | set(terminal_map) | set(transfer_map)

          result = []
          for d in sorted(all_dates):
              prev = existing.get(d, {})
              term = terminal_map.get(d, {})
              result.append({
                  'd': d,
                  'unixTs':        str(term.get('unixTs',        prev.get('unixTs', ''))),
                  'terminalPrice': str(term.get('terminalPrice', prev.get('terminalPrice', ''))),
                  'transferPrice': str(transfer_map.get(d,       prev.get('transferPrice', '')))
              })

          with open('terminal-price.json', 'w') as f:
              json.dump(result, f, separators=(',', ':'))

          print(f'Done: {len(result)} records saved')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terminal-price.json
          git diff --staged --quiet || git commit -m "Update terminal price $(date -u +%Y-%m-%d)"
          git push

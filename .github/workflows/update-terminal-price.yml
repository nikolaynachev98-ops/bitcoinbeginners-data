name: Update Bitcoin Terminal Price

on:
  schedule:
    - cron: '5 0 * * *'  # Daily after Midnight UTC
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch terminal price and compute transfer price
        env:
          BGEOMETRICS_TOKEN: ${{ secrets.BGEOMETRICS_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          from urllib.request import Request, urlopen
          from urllib.parse import urlencode
          from datetime import datetime, timezone, timedelta

          FETCH_TERMINAL = False

          TOKEN = os.environ.get('BGEOMETRICS_TOKEN', '')
          GENESIS = datetime(2009, 1, 3, tzinfo=timezone.utc)

          # ── BGeometrics: terminal price ──────────────────────────────────
          def fetch_terminal():
              all_records = []
              page = 1
              size = 5000
              while True:
                  url = 'https://api.bitcoin-data.com/v1/terminal-price?' + urlencode({'page': page, 'size': size})
                  req = Request(url)
                  if TOKEN:
                      req.add_header('Authorization', 'Bearer ' + TOKEN)
                  with urlopen(req, timeout=30) as resp:
                      data = json.loads(resp.read().decode())
                  records = data if isinstance(data, list) else data.get('_embedded', {}).get('terminalPriceList', [])
                  if not records:
                      break
                  all_records.extend(records)
                  print(f'terminal-price page {page}: {len(records)} records')
                  if len(records) < size:
                      break
                  page += 1
              return all_records

          # ── Bitcoin supply from halving schedule (deterministic) ─────────
          HALVINGS = [
              (datetime(2009,  1,  3, tzinfo=timezone.utc), 50.0),
              (datetime(2012, 11, 28, tzinfo=timezone.utc), 25.0),
              (datetime(2016,  7,  9, tzinfo=timezone.utc), 12.5),
              (datetime(2020,  5, 11, tzinfo=timezone.utc),  6.25),
              (datetime(2024,  4, 20, tzinfo=timezone.utc),  3.125),
          ]

          def btc_supply(date):
              supply = 0.0
              for i, (start, reward) in enumerate(HALVINGS):
                  end = HALVINGS[i + 1][0] if i + 1 < len(HALVINGS) else date
                  if date <= start:
                      break
                  days = (min(date, end) - start).days
                  supply += days * 144 * reward
              return supply

          # ── Blockchain.info: daily price history ────────────────────────
          def fetch_prices():
              url = 'https://api.blockchain.info/charts/market-price?format=json&timespan=all&cors=true'
              with urlopen(url, timeout=60) as resp:
                  data = json.loads(resp.read().decode())
              price_map = {}
              for v in data.get('values', []):
                  d = datetime.fromtimestamp(v['x'], tz=timezone.utc).strftime('%Y-%m-%d')
                  price_map[d] = float(v['y'])
              print(f'prices: {len(price_map)} days')
              return price_map

          # ── BGeometrics: CDD full history ────────────────────────────────
          def fetch_cdd():
              all_records = []
              page = 1
              size = 5000
              today     = datetime.now(timezone.utc).strftime('%Y-%m-%d')
              startday  = (datetime.now(timezone.utc) - timedelta(days=4 * 365)).strftime('%Y-%m-%d')
              while True:
                  url = 'https://api.bitcoin-data.com/v1/cdd?' + urlencode({
                      'startday': startday, 'endday': today, 'page': page, 'size': size
                  })
                  req = Request(url)
                  if TOKEN:
                      req.add_header('Authorization', 'Bearer ' + TOKEN)
                  with urlopen(req, timeout=30) as resp:
                      data = json.loads(resp.read().decode())
                  records = data if isinstance(data, list) else data.get('_embedded', {}).get('cddList', [])
                  if not records:
                      break
                  all_records.extend(records)
                  print(f'cdd page {page}: {len(records)} records')
                  if len(records) < size:
                      break
                  page += 1
              return sorted(all_records, key=lambda r: r['d'])

          # ── Compute transfer price from CDD ──────────────────────────────
          # Transfer Price = Σ(CDD × Price) / supply / days_since_genesis × 21
          # CDD (BTC·days) × Price ($/BTC) = $·days → / supply (BTC) / days = $/BTC ✓
          def compute_transfer_prices(cdd_data, price_map):
              transfer_map = {}
              cumulative_cdd_value = 0.0
              for row in cdd_data:
                  d      = row['d']
                  date   = datetime.fromtimestamp(int(row['unixTs']), tz=timezone.utc)
                  cdd    = float(row.get('cdd') or 0)
                  price  = price_map.get(d, 0)
                  if price <= 0:
                      continue
                  days_since_genesis = max((date - GENESIS).days, 1)
                  supply = btc_supply(date)
                  cumulative_cdd_value += cdd * price
                  if supply > 0:
                      transfer = (cumulative_cdd_value / supply / days_since_genesis) * 21
                      transfer_map[d] = round(transfer, 2)
              return transfer_map

          # ── Load existing file ───────────────────────────────────────────
          try:
              with open('terminal-price.json') as f:
                  existing = {r['d']: r for r in json.load(f)}
          except Exception:
              existing = {}

          terminal_data = fetch_terminal() if FETCH_TERMINAL else []
          price_map     = fetch_prices()
          cdd_data      = fetch_cdd()
          transfer_map  = compute_transfer_prices(cdd_data, price_map)

          terminal_map = {r['d']: r for r in terminal_data}
          all_dates    = set(existing) | set(terminal_map)

          result = []
          for d in sorted(all_dates):
              prev = existing.get(d, {})
              term = terminal_map.get(d, {})
              result.append({
                  'd':             d,
                  'unixTs':        str(term.get('unixTs',        prev.get('unixTs', ''))),
                  'terminalPrice': str(term.get('terminalPrice', prev.get('terminalPrice', ''))),
                  'transferPrice': str(transfer_map.get(d,       prev.get('transferPrice', '')))
              })

          with open('terminal-price.json', 'w') as f:
              json.dump(result, f, separators=(',', ':'))

          print(f'Done: {len(result)} records saved to terminal-price.json')

          # ── Save raw CDD data ────────────────────────────────────────────
          cdd_result = []
          for row in cdd_data:
              cdd_result.append({
                  'd':   row['d'],
                  'cdd': str(row.get('cdd') or '')
              })

          with open('cdd-data.json', 'w') as f:
              json.dump(cdd_result, f, separators=(',', ':'))

          print(f'Done: {len(cdd_result)} records saved to cdd-data.json')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terminal-price.json
          git diff --staged --quiet || git commit -m "Update terminal price $(date -u +%Y-%m-%d)"
          git push

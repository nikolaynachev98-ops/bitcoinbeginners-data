name: Update Bitcoin Terminal Price

on:
  schedule:
    - cron: '5 0 * * *'  # Daily after Midnight UTC
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch terminal price and compute transfer price
        env:
          BGEOMETRICS_TOKEN: ${{ secrets.BGEOMETRICS_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          from urllib.request import Request, urlopen
          from urllib.parse import urlencode
          from datetime import datetime, timezone, timedelta

          TOKEN = os.environ.get('BGEOMETRICS_TOKEN', '')
          GENESIS = datetime(2009, 1, 3, tzinfo=timezone.utc)

          # ── BGeometrics: generic paginated fetch ─────────────────────────
          def fetch_all(endpoint):
              all_records = []
              page     = 1
              size     = 5000
              today    = datetime.now(timezone.utc).strftime('%Y-%m-%d')
              startday = (datetime.now(timezone.utc) - timedelta(days=4 * 365)).strftime('%Y-%m-%d')
              while True:
                  url = f'https://api.bitcoin-data.com/v1/{endpoint}?' + urlencode({
                      'startday': startday, 'endday': today, 'page': page, 'size': size
                  })
                  req = Request(url)
                  if TOKEN:
                      req.add_header('Authorization', 'Bearer ' + TOKEN)
                  with urlopen(req, timeout=30) as resp:
                      data = json.loads(resp.read().decode())
                  records = data if isinstance(data, list) else data.get('_embedded', {}).get('cddList',
                            data.get('_embedded', {}).get('terminalPriceList', []))
                  if not records:
                      break
                  all_records.extend(records)
                  print(f'{endpoint} page {page}: {len(records)} records')
                  if len(records) < size:
                      break
                  page += 1
              return all_records

          # ── Bitcoin supply from halving schedule (deterministic) ─────────
          HALVINGS = [
              (datetime(2009,  1,  3, tzinfo=timezone.utc), 50.0),
              (datetime(2012, 11, 28, tzinfo=timezone.utc), 25.0),
              (datetime(2016,  7,  9, tzinfo=timezone.utc), 12.5),
              (datetime(2020,  5, 11, tzinfo=timezone.utc),  6.25),
              (datetime(2024,  4, 20, tzinfo=timezone.utc),  3.125),
          ]

          def btc_supply(date):
              supply = 0.0
              for i, (start, reward) in enumerate(HALVINGS):
                  end = HALVINGS[i + 1][0] if i + 1 < len(HALVINGS) else date
                  if date <= start:
                      break
                  days = (min(date, end) - start).days
                  supply += days * 144 * reward
              return supply

          # ── Blockchain.info: daily price history ────────────────────────
          def fetch_prices():
              url = 'https://api.blockchain.info/charts/market-price?format=json&timespan=all&cors=true'
              with urlopen(url, timeout=60) as resp:
                  data = json.loads(resp.read().decode())
              price_map = {}
              for v in data.get('values', []):
                  d = datetime.fromtimestamp(v['x'], tz=timezone.utc).strftime('%Y-%m-%d')
                  price_map[d] = float(v['y'])
              print(f'prices: {len(price_map)} days')
              return price_map


          # ── Hybrid transfer price: API data until corruption, then CDD ────
          # Walk transfer-price API data chronologically. If the next day jumps 2x,
          # treat it as corruption, back-calculate the cumulative CDD value from
          # the last clean seed, and continue forward using CDD × price.
          def compute_transfer_prices(transfer_data, cdd_data, price_map):
              transfer_map = {}

              # Phase 1: use API transfer prices until a 2x jump is detected
              prev_transfer = None
              seed_date     = None
              seed_transfer = None
              for row in sorted(transfer_data, key=lambda r: r['d']):
                  d            = row['d']
                  api_transfer = float(row.get('transferPrice') or 0)
                  if api_transfer <= 0:
                      continue
                  if prev_transfer and api_transfer > prev_transfer * 2:
                      print(f'Corruption at {d}: {prev_transfer} → {api_transfer}, switching to CDD')
                      break
                  transfer_map[d] = round(api_transfer, 2)
                  seed_date     = d
                  seed_transfer = api_transfer
                  prev_transfer = api_transfer

              print(f'API transfer prices: {len(transfer_map)} records, seed={seed_date} @ {seed_transfer}')

              if not seed_date:
                  print('No valid API seed found')
                  return transfer_map

              # Phase 2: back-calculate cumulative from seed, continue with CDD
              seed_dt     = datetime.strptime(seed_date, '%Y-%m-%d').replace(tzinfo=timezone.utc)
              seed_days   = max((seed_dt - GENESIS).days, 1)
              seed_supply = btc_supply(seed_dt)
              cumulative  = seed_transfer * seed_supply * seed_days / 21
              print(f'Seeded cumulative: {cumulative:.4e}')

              last_cumulative = cumulative
              for row in sorted(cdd_data, key=lambda r: r['d']):
                  d     = row['d']
                  if d <= seed_date:
                      continue
                  cdd   = float(row.get('cdd') or 0)
                  price = price_map.get(d, 0)
                  if price <= 0:
                      continue
                  cumulative += cdd * price
                  if last_cumulative > 0 and (cumulative - last_cumulative) / last_cumulative < 0.0005:
                      continue
                  date   = datetime.strptime(d, '%Y-%m-%d').replace(tzinfo=timezone.utc)
                  supply = btc_supply(date)
                  days   = max((date - GENESIS).days, 1)
                  if supply > 0:
                      transfer_map[d] = round((cumulative / supply / days) * 21, 2)
                      last_cumulative  = cumulative

              print(f'Total transfer prices: {len(transfer_map)}')
              return transfer_map

          # ── Load existing file ───────────────────────────────────────────
          try:
              with open('terminal-price.json') as f:
                  existing = {r['d']: r for r in json.load(f)}
          except Exception:
              existing = {}

          transfer_data  = fetch_all('transfer-price')
          cdd_data       = sorted(fetch_all('cdd'), key=lambda r: r['d'])
          price_map      = fetch_prices()
          transfer_map   = compute_transfer_prices(transfer_data, cdd_data, price_map)

          all_dates    = set(existing)

          result = []
          last_transfer = None
          for d in sorted(all_dates):
              prev = existing.get(d, {})
              term = {}
              # Update running transfer price when new data is available
              if d in transfer_map:
                  last_transfer = transfer_map[d]
              # Forward-fill for days without CDD data; only fall back to existing
              # value if we have no new data at all yet (before CDD history starts)
              transfer_price = str(last_transfer) if last_transfer is not None else prev.get('transferPrice', '')
              result.append({
                  'd':             d,
                  'unixTs':        str(term.get('unixTs',        prev.get('unixTs', ''))),
                  'terminalPrice': str(term.get('terminalPrice', prev.get('terminalPrice', ''))),
                  'transferPrice': transfer_price
              })

          with open('terminal-price.json', 'w') as f:
              json.dump(result, f, separators=(',', ':'))

          print(f'Done: {len(result)} records saved to terminal-price.json')

          # ── Save raw CDD data ────────────────────────────────────────────
          cdd_result = []
          for row in cdd_data:
              cdd_result.append({
                  'd':   row['d'],
                  'cdd': str(row.get('cdd') or '')
              })

          with open('cdd-data.json', 'w') as f:
              json.dump(cdd_result, f, separators=(',', ':'))

          print(f'Done: {len(cdd_result)} records saved to cdd-data.json')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terminal-price.json
          git diff --staged --quiet || git commit -m "Update terminal price $(date -u +%Y-%m-%d)"
          git push
